name: test_sweep
group: Test

program: train.py

method: random

metric:
  name: val_accuracy
  goal: maximize

parameters:

  learning_rate:
    values: [0.0005, 0.001, 0.003]

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  hidden_size:
    values:
      - "128 128"
      - "128 128 64"
      - "256 128"

  weight_init:
    values: ["random","xavier"]