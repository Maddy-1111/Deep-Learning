program: train.py

method: grid

metric:
  name: val_accuracy
  goal: maximize

parameters:

  learning_rate:
    values: [0.0005, 0.001, 0.003]

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: ["rmsprop"]

  activation:
    values: ["relu", "sigmoid"]

  hidden_size:
    values:
      - "128 128"

  weight_init:
    values: ["xavier"]